<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>form</title>
    </head>
    <body>
        <!-- create student registration form which include fields like full name,email,password,mobile number,date of birth, gender (radio), skills (checkbox), address (textarea), upload profile photo, submit button reset button -->

        <form action="#" method="post" enctype="multipart/form-data">
            <label for="full-name">Full Name:</label>
            <input type="text" id="full-name" name="full-name" required><br><br>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required><br><br>

            <label for="password">Password:</label>
            <input type="password" id="password" name="password"
                required><br><br>

            <label for="mobile-number">Mobile Number:</label>
            <input type="tel" id="mobile-number" name="mobile-number"
                required><br><br>

            <label for="dob">Date of Birth:</label>
            <input type="date" id="dob" name="dob" required><br><br>

            <label>Gender:</label>

            <input type="radio" id="male" name="gender" value="male" required>
            <label for="male">Male</label>

            <input type="radio" id="female" name="gender" value="female"
                required>
            <label for="female">Female</label>

            <br><br>
            <input type="checkbox" id="skills" name="skills" value="html">
            <label for="skills">HTML</label>
            <label for="skills">CSS</label>
            <label for="skills">JavaScript</label>

            <br><br>
            <label for="address">Address:</label><br>
            <textarea id="address" name="address" rows="4" cols="50"
                required></textarea><br><br>

            <br><br>
            <label for="profile-photo">Upload Profile Photo:</label>
            <input type="file" id="profile-photo" name="profile-photo"
                accept="image/*" required><br><br>

            <br><br>
            <input type="submit" value="Submit">
            <input type="reset" value="Reset">

        </form>
    </body>
</html>
