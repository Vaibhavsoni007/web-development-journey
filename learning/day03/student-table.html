<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>student report card</title>
    </head>
    <body>
        <!-- create a table for student report card have columns Roll number, Name, Subject, Marks, Percentage with 5 rows of data. -->
        <table border="1">
            <thead>
                <tr>
                    <th>Roll number</th>
                    <th>Name</th>
                    <th>Subject</th>
                    <th>Marks</th>
                    <th>Percentage</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>1</td>
                    <td>John Doe</td>
                    <td>Mathematics</td>
                    <td>85</td>
                    <td>85%</td>
                </tr>
                <tr>
                    <td>2</td>
                    <td>Jane Smith</td>
                    <td>Science</td>
                    <td>90</td>
                    <td>90%</td>
                </tr>
                <tr>
                    <td>3</td>
                    <td>Bob Johnson</td>
                    <td>English</td>
                    <td>78</td>
                    <td>78%</td>
                </tr>
                <tr>
                    <td>4</td>
                    <td>Alice Williams</td>
                    <td>Hindi</td>
                    <td>92</td>
                    <td>92%</td>
                </tr>
                <tr>
                    <td>5</td>
                    <td>Charlie Brown</td>
                    <td>Social Studies</td>
                    <td>88</td>
                    <td>88%</td>
                </tr>
            </tbody>
        </table>
    </body>
</html>
